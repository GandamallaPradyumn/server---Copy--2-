data:
  features_parquet: /home/sr/agnigent/ai_agents/dynamic_scheduling/data/features/ops_daily_features.parquet
  target_col: passenger_kms
  date_col: date
  group_col: depot
feature_selection:
  mode: drop
  cols_to_drop:
  - depot
  - date
  - passengers_per_day
  - actual_kms
  - occupancy_ratio
  - passenger_kms
  - festival_intensity
  - Holiday_Festival
  - fes_hol_category
  - baseline_same_dow
  - expected_festival_demand
  - year
  - day_of_month
  - week_of_year
  - marriage_day
  - moudyami_day
  - is_fes_hol
  - is_weekend
  - avg_temp
  - temp_range
  - is_heavy_rain
  - pkm_lag2_dow_dev
  - telugu_paksham_encoded
  - telugu_month_encoded
  - Holiday_Festival_encoded
  - fes_hol_category_encoded
  - dow
split:
  method: last_n_days
  test_days: 90
xgb:
  n_estimators: 2000
  learning_rate: 0.03
  max_depth: 5
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 3.0
  min_child_weight: 5.0
  objective: reg:squarederror
  random_state: 42
  n_jobs: -1
  early_stopping_rounds: 50
outputs:
  model_file: xgb_model.joblib
  features_file: features.json
forecast:
  horizon: 2
feature_engineering:
  outlier_iqr_mult: 3.0
  epoch_date: "2023-01-01"
  festival:
    distance_cap: 30
    rebound_days: 4
    proximity_before: [1, 2, 3]
    proximity_after: [1, 2]
    post_festival_weekend_days: [1, 2, 3]
    same_dow_window: 3
    same_dow_min_periods: 3
  weather:
    rainy_threshold_mm: 0
    heavy_rain_threshold_mm: 10
  lags:
    shifts: [2, 7, 14, 21]
    rolling_windows:
      - {window: 7, min_periods: 3}
      - {window: 14, min_periods: 5}
      - {window: 21, min_periods: 7}
    same_dow_rolling: {window: 3, min_periods: 2}
prediction_defaults:
  bus_capacity: 45
  assumed_or: 0.85
  km_per_bus: 250
  rolling_or_window_days: 30
  rolling_or_min_points: 5
  rolling_or_fallback: 0.85
scheduling_policy:
  target_or: 0.75
  tolerance_pct: 0.03
  lookback_days: 7
  max_trip_change_per_service: 1
  min_trips_per_service: 0
  underutilized_or: 0.65
  overloaded_or: 0.95
  stop_or: 0.45
  morning_peak_start: "06:00"
  morning_peak_end: "10:00"
  evening_peak_start: "16:30"
  evening_peak_end: "20:30"
  prefer_peak_when_adding: true
  protect_peak_when_cutting: true
  max_changes_per_route: 2
  route_column: route
  max_services_changed: 25
  prefer_short_kmpt_when_adding: true
  fallback_pkm: 2000000
  avg_km_per_passenger: 25
epk_policy:
  lookback_days: 15
  or_threshold_add: 0.85
  epk_premium_add: 1.05
  or_threshold_cut: 0.50
  epk_discount_cut: 0.90
  default_rev_per_pkm: 0.0
  default_cpk: 25.0
  or_quadrant_boundary: 0.70
